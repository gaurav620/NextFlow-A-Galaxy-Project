<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NextFlow — Workflow Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060612;font-family:'Inter',sans-serif;color:#fff;overflow:hidden;width:100vw;height:100vh}
.toolbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(8,8,20,.98);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 18px;gap:12px;z-index:200}
.logo{font-size:14px;font-weight:800;background:linear-gradient(135deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sep{width:1px;height:18px;background:rgba(255,255,255,.08)}
.tbtn{height:28px;padding:0 11px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#999;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif}
.tbtn:hover{border-color:#a855f780;color:#d8b4fe;background:rgba(168,85,247,.1)}
.tbtn.on{border-color:#a855f7;color:#a855f7;background:rgba(168,85,247,.14)}
.htip-txt{margin-left:auto;font-size:11px;color:#333}
#cv{position:absolute;top:50px;left:0;right:0;bottom:0}
#edge-svg{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:visible}
.node{position:absolute;border-radius:14px;border:1px solid;cursor:grab;z-index:10;width:200px;background:#0d0d1e}
.node:active{cursor:grabbing}
.node.sel{z-index:50}
.nh{padding:11px 14px 9px;border-radius:13px 13px 0 0;display:flex;align-items:center;gap:9px}
.ni{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ntitle{font-size:12px;font-weight:700;color:#e0e0e0}
.nsub{font-size:9px;color:#444;margin-top:1px}
.nb{padding:6px 14px 12px}
.hrow{display:flex;align-items:center;height:24px;position:relative;font-size:10px;color:#666}
.hrow.inp{padding-left:18px}
.hrow.out{padding-right:18px;justify-content:flex-end}
.hport{width:12px;height:12px;border-radius:50%;border:2px solid;position:absolute;cursor:pointer;transition:transform .15s}
.hrow.inp .hport{left:-6px}
.hrow.out .hport{right:-6px}
.hport:hover{transform:scale(1.7);z-index:99}
.divider{height:1px;background:#ffffff08;margin:5px 0}
.n-text{border-color:#3b82f640}.n-text .nh{background:#3b82f60a}.n-text.sel{border-color:#3b82f6;box-shadow:0 0 30px #3b82f630}
.n-img{border-color:#22c55e40}.n-img .nh{background:#22c55e0a}.n-img.sel{border-color:#22c55e;box-shadow:0 0 30px #22c55e30}
.n-vid{border-color:#f9731640}.n-vid .nh{background:#f973160a}.n-vid.sel{border-color:#f97316;box-shadow:0 0 30px #f9731630}
.n-llm{border-color:#a855f740}.n-llm .nh{background:#a855f70a}.n-llm.sel{border-color:#a855f7;box-shadow:0 0 30px #a855f740}
.n-crop{border-color:#eab30840}.n-crop .nh{background:#eab3080a}.n-crop.sel{border-color:#eab308;box-shadow:0 0 30px #eab30830}
.n-frame{border-color:#ec489940}.n-frame .nh{background:#ec48990a}.n-frame.sel{border-color:#ec4899;box-shadow:0 0 30px #ec489930}
/* info */
.panel{position:fixed;right:18px;top:66px;width:250px;background:#0a0a18f5;border:1px solid #ffffff10;border-radius:15px;padding:15px;z-index:300;backdrop-filter:blur(20px)}
.panel h2{font-size:13px;font-weight:700;margin-bottom:3px;color:#ddd}
.pdesc{font-size:11px;color:#444;margin-bottom:12px;line-height:1.5}
.psec h4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#333;margin-bottom:7px}
.psec{margin-bottom:11px}
.prow{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.plab{color:#bbb}.ptyp{color:#333;font-size:9px;margin-left:auto}
.pcon{font-size:11px;color:#888;margin-bottom:2px}.pcon-why{font-size:10px;color:#333;margin-bottom:7px;padding-left:10px}
/* legend */
.leg{position:fixed;bottom:18px;left:18px;background:#0a0a18f5;border:1px solid #ffffff0a;border-radius:12px;padding:13px 15px;z-index:300}
.leg h3{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#333;margin-bottom:8px}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:11px;color:#555}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@keyframes dash{from{stroke-dashoffset:0}to{stroke-dashoffset:-22}}
</style>
</head>
<body>
<div class="toolbar">
  <span class="logo">⚡ NextFlow</span>
  <span style="font-size:11px;color:#444;font-weight:500">Node Connection Guide</span>
  <div class="sep"></div>
  <button class="tbtn on" id="bsample" onclick="loadSample()">📦 Marketing Kit</button>
  <button class="tbtn" onclick="clearEdges()">✕ Clear</button>
  <button class="tbtn" onclick="resetPos()">↺ Reset</button>
  <span class="htip-txt">Drag nodes · Click to inspect · Hover ports</span>
</div>

<div id="cv">
  <svg id="edge-svg"></svg>
</div>

<div class="panel">
  <h2 id="pt" style="color:#333">← Select a node</h2>
  <p class="pdesc" id="pd">Click any node to see its handles and valid connections</p>
  <div id="pb"></div>
</div>

<div class="leg">
  <h3>Handle Types</h3>
  <div class="lr"><div class="ld" style="background:#3b82f6"></div>text / prompt</div>
  <div class="lr"><div class="ld" style="background:#22c55e"></div>image_url</div>
  <div class="lr"><div class="ld" style="background:#f97316"></div>video_url</div>
  <div class="lr"><div class="ld" style="background:#a855f7"></div>images[] array</div>
  <div class="lr"><div class="ld" style="background:#eab308"></div>number (%)</div>
</div>

<script>
const NODE_H_ROW = 24; // px per handle row
const NODE_HDR   = 50; // header height
const NODE_PAD   = 6;  // top padding of body

// Node handle y-offset: header + pad + (rowIndex * rowH) + rowH/2
function handleY(rowIndex){ return NODE_HDR + NODE_PAD + rowIndex * NODE_H_ROW + NODE_H_ROW/2; }

const DEFS = [
  {id:'t1', type:'text', label:'Text Node',     sub:'User message',         icon:'✏️', cls:'n-text', x:50,  y:60,
   inputs:[], outputs:[{id:'o', lbl:'text output', c:'#3b82f6', t:'text'}]},
  {id:'t2', type:'text', label:'Text Node',     sub:'System prompt',        icon:'✏️', cls:'n-text', x:50,  y:230,
   inputs:[], outputs:[{id:'o', lbl:'text output', c:'#3b82f6', t:'text'}]},
  {id:'i1', type:'img',  label:'Image Upload',  sub:'jpg · png → CDN URL', icon:'🖼️', cls:'n-img',  x:50,  y:400,
   inputs:[], outputs:[{id:'o', lbl:'image_url', c:'#22c55e', t:'image_url'}]},
  {id:'v1', type:'vid',  label:'Video Upload',  sub:'mp4 → CDN URL',       icon:'🎬', cls:'n-vid',  x:50,  y:540,
   inputs:[], outputs:[{id:'o', lbl:'video_url', c:'#f97316', t:'video_url'}]},
  {id:'c1', type:'crop', label:'Crop Image',    sub:'% region · FFmpeg',   icon:'✂️', cls:'n-crop', x:360, y:340,
   inputs:[
     {id:'img', lbl:'image_url',   c:'#22c55e', t:'image_url'},
     {id:'x',   lbl:'x % (left)', c:'#eab308', t:'number'},
     {id:'y',   lbl:'y % (top)',  c:'#eab308', t:'number'},
     {id:'w',   lbl:'width %',    c:'#eab308', t:'number'},
     {id:'h',   lbl:'height %',   c:'#eab308', t:'number'},
   ],
   outputs:[{id:'o', lbl:'image_url (cropped)', c:'#22c55e', t:'image_url'}]},
  {id:'f1', type:'frame',label:'Extract Frame', sub:'video → img · FFmpeg',icon:'🎞️', cls:'n-frame', x:360, y:560,
   inputs:[
     {id:'vid', lbl:'video_url',     c:'#f97316', t:'video_url'},
     {id:'ts',  lbl:'timestamp (s)', c:'#eab308', t:'number'},
   ],
   outputs:[{id:'o', lbl:'image_url (frame)', c:'#22c55e', t:'image_url'}]},
  {id:'l1', type:'llm',  label:'LLM Node (Gemini)',sub:'vision · multi-modal',icon:'✨', cls:'n-llm', x:660, y:180,
   inputs:[
     {id:'sys',  lbl:'system_prompt', c:'#3b82f6', t:'text'},
     {id:'usr',  lbl:'user_message',  c:'#3b82f6', t:'text'},
     {id:'imgs', lbl:'images[ ]',     c:'#a855f7', t:'images[]'},
   ],
   outputs:[{id:'o', lbl:'text output', c:'#3b82f6', t:'text'}]},
];

const INFO = {
  text:{desc:'Provides text — prompts, instructions, or numeric strings.',
    cn:[{to:'LLM → system_prompt',why:"Set AI's persona/behavior"},{to:'LLM → user_message',why:'Main question or task for AI'},{to:'Crop → x/y/w/h',why:'Pass % values as text'}]},
  img:{desc:'Uploads image to Transloadit CDN. Outputs a public image URL.',
    cn:[{to:'LLM → images[ ]',why:'Feed image to Gemini vision model'},{to:'Crop → image_url',why:'Crop a region before sending to AI'}]},
  vid:{desc:'Uploads video to CDN. Outputs a public video URL.',
    cn:[{to:'Extract Frame → video_url',why:'Pull a still frame at timestamp'}]},
  crop:{desc:'Crops image via Transloadit /image/resize (FFmpeg). Needs image_url + x/y/w/h %.',
    cn:[{to:'LLM → images[ ]',why:'Analyze cropped region with AI'},{to:'Another Crop → image_url',why:'Nested crop pass'}]},
  frame:{desc:'Extracts a video frame via Transloadit /video/thumbs (FFmpeg).',
    cn:[{to:'LLM → images[ ]',why:'Analyze video moment with Gemini vision'},{to:'Crop → image_url',why:'Crop the extracted frame'}]},
  llm:{desc:'Runs Gemini AI. Accepts text + images array. Outputs generated text.',
    cn:[{to:'Another LLM → user_message',why:'Chain AI steps in a pipeline'},{to:'Any text input',why:'Pass AI output to downstream nodes'}]},
};

// Sample edges: [fromId, fromPortId, toId, toPortId]
const SAMPLE = [
  ['t1','o','l1','usr'],
  ['t2','o','l1','sys'],
  ['i1','o','c1','img'],
  ['c1','o','l1','imgs'],
  ['v1','o','f1','vid'],
  ['f1','o','l1','imgs'],
];

let pos = {};   // id -> {x,y}
let els = {};   // id -> DOM node
let edges = [];
let drag = null, dox = 0, doy = 0;
let sel = null;

const cv = document.getElementById('cv');
const esvg = document.getElementById('edge-svg');

// ── BUILD ──
function build(){
  cv.querySelectorAll('.node').forEach(e=>e.remove());
  els = {};
  DEFS.forEach(n=>{
    pos[n.id] = {x:n.x, y:n.y};
    const el = document.createElement('div');
    el.className = `node ${n.cls}`;
    el.id = 'nd_'+n.id;
    el.dataset.id = n.id;
    el.style.left = n.x+'px';
    el.style.top  = n.y+'px';

    const inH = n.inputs.map((h,i)=>`
      <div class="hrow inp">
        <div class="hport" style="background:${h.c};border-color:${h.c}" data-nid="${n.id}" data-hid="${h.id}" data-side="in" title="${h.lbl} · ${h.t}"></div>
        ${h.lbl}
      </div>`).join('');
    const outH = n.outputs.map((h,i)=>`
      <div class="hrow out">
        <div class="hport" style="background:${h.c};border-color:${h.c}" data-nid="${n.id}" data-hid="${h.id}" data-side="out" title="${h.lbl} · ${h.t}"></div>
        ${h.lbl}
      </div>`).join('');

    el.innerHTML = `
      <div class="nh">
        <div class="ni">${n.icon}</div>
        <div><div class="ntitle">${n.label}</div><div class="nsub">${n.sub}</div></div>
      </div>
      <div class="nb">
        ${inH}${inH&&outH?'<div class="divider"></div>':''}${outH}
      </div>`;

    cv.appendChild(el);
    els[n.id] = el;
    el.addEventListener('mousedown', e=>{
      if(e.target.classList.contains('hport')) return;
      e.preventDefault();
      drag = n.id;
      dox = e.clientX - pos[n.id].x;
      doy = e.clientY - 50 - pos[n.id].y;
    });
    el.addEventListener('click', ()=>selectNode(n.id));
  });
}

// ── DRAG ──
document.addEventListener('mousemove', e=>{
  if(!drag) return;
  const x = Math.max(0, e.clientX - dox);
  const y = Math.max(0, e.clientY - 50 - doy);
  pos[drag] = {x,y};
  els[drag].style.left = x+'px';
  els[drag].style.top  = y+'px';
  draw();
});
document.addEventListener('mouseup', ()=>{ drag=null; });

// ── GET PORT POSITION (calculated, not getBoundingClientRect) ──
function portPos(nid, hid, side){
  const nd = DEFS.find(n=>n.id===nid);
  const p  = pos[nid];
  const list = side==='out' ? nd.outputs : nd.inputs;
  const idx  = list.findIndex(h=>h.id===hid);
  // y: header(50) + top-pad(6) + inp rows before divider + out rows
  let rowY;
  if(side==='in'){
    rowY = NODE_HDR + NODE_PAD + idx * NODE_H_ROW + NODE_H_ROW/2;
    return {x: p.x - 0, y: p.y + rowY};  // left edge
  } else {
    const inCount = nd.inputs.length;
    const divH    = inCount > 0 ? 11 : 0; // divider area
    rowY = NODE_HDR + NODE_PAD + inCount * NODE_H_ROW + divH + idx * NODE_H_ROW + NODE_H_ROW/2;
    return {x: p.x + 200, y: p.y + rowY}; // right edge (node width=200)
  }
}

// ── DRAW EDGES ──
function draw(){
  esvg.innerHTML = `<defs>
    <filter id="eg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  edges.forEach((edge,i)=>{
    const [fn,fh,tn,th] = edge;
    const from = portPos(fn,fh,'out');
    const to   = portPos(tn,th,'in');
    const nd   = DEFS.find(n=>n.id===fn);
    const ho   = nd.outputs.find(h=>h.id===fh);
    const color = ho?.c || '#a855f7';

    const dx = Math.max(60, Math.abs(to.x-from.x)*0.45);
    const d = `M${from.x},${from.y} C${from.x+dx},${from.y} ${to.x-dx},${to.y} ${to.x},${to.y}`;

    // Glow background
    const glowP = document.createElementNS('http://www.w3.org/2000/svg','path');
    glowP.setAttribute('d',d); glowP.setAttribute('stroke',color);
    glowP.setAttribute('stroke-width','6'); glowP.setAttribute('fill','none');
    glowP.setAttribute('opacity','0.2'); glowP.setAttribute('filter','url(#eg)');
    esvg.appendChild(glowP);

    // Animated dashed line
    const pid = 'p'+i;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('id',pid); p.setAttribute('d',d);
    p.setAttribute('stroke',color); p.setAttribute('stroke-width','2');
    p.setAttribute('fill','none'); p.setAttribute('stroke-dasharray','7 4');
    p.style.animation = `dash ${1.1+i*0.13}s linear infinite`;
    esvg.appendChild(p);

    // Moving ball
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('r','4'); dot.setAttribute('fill',color);
    dot.setAttribute('filter','url(#eg)');
    const am = document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
    am.setAttribute('dur',`${1.4+i*0.18}s`);
    am.setAttribute('repeatCount','indefinite');
    am.setAttribute('keyTimes','0;1');
    am.setAttribute('keySplines','0.25 0.1 0.25 1');
    // Use calcMode spline with path inline
    const ampath = document.createElementNS('http://www.w3.org/2000/svg','mpath');
    ampath.setAttributeNS('http://www.w3.org/1999/xlink','href','#'+pid);
    am.appendChild(ampath);
    dot.appendChild(am);
    esvg.appendChild(dot);

    // Arrowhead at target
    // Approximate direction from last control point to end
    const arrX = to.x, arrY = to.y;
    const ax1 = to.x-dx, ay1 = to.y;
    const angle = Math.atan2(arrY-ay1, arrX-ax1);
    const a1x = arrX - 10*Math.cos(angle-0.4);
    const a1y = arrY - 10*Math.sin(angle-0.4);
    const a2x = arrX - 10*Math.cos(angle+0.4);
    const a2y = arrY - 10*Math.sin(angle+0.4);
    const arr = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    arr.setAttribute('points',`${arrX},${arrY} ${a1x},${a1y} ${a2x},${a2y}`);
    arr.setAttribute('fill',color); arr.setAttribute('opacity','0.9');
    esvg.appendChild(arr);
  });
}

// ── SELECT NODE ──
function selectNode(nid){
  document.querySelectorAll('.node').forEach(e=>e.classList.remove('sel'));
  sel = nid;
  els[nid].classList.add('sel');
  const nd = DEFS.find(n=>n.id===nid);
  const inf = INFO[nd.type];
  document.getElementById('pt').textContent = nd.label;
  document.getElementById('pt').style.color = '#ddd';
  document.getElementById('pd').textContent = inf.desc;
  let h = '';
  if(nd.inputs.length){
    h += `<div class="psec"><h4>⬅ Inputs</h4>`;
    nd.inputs.forEach(p=>{ h+=`<div class="prow"><div class="pdot" style="background:${p.c}"></div><span class="plab">${p.lbl}</span><span class="ptyp">${p.t}</span></div>`; });
    h += '</div>';
  }
  if(nd.outputs.length){
    h += `<div class="psec"><h4>➡ Outputs</h4>`;
    nd.outputs.forEach(p=>{ h+=`<div class="prow"><div class="pdot" style="background:${p.c}"></div><span class="plab">${p.lbl}</span><span class="ptyp">${p.t}</span></div>`; });
    h += '</div>';
  }
  h += `<div class="psec"><h4>🔗 Connects To</h4>`;
  inf.cn.forEach(c=>{ h+=`<div class="pcon">→ <span style="color:#ccc">${c.to}</span></div><div class="pcon-why">${c.why}</div>`; });
  h += '</div>';
  document.getElementById('pb').innerHTML = h;
}

function loadSample(){ edges=[...SAMPLE]; document.getElementById('bsample').classList.add('on'); draw(); }
function clearEdges(){ edges=[]; document.getElementById('bsample').classList.remove('on'); draw(); }
function resetPos(){
  DEFS.forEach(n=>{ pos[n.id]={x:n.x,y:n.y}; els[n.id].style.left=n.x+'px'; els[n.id].style.top=n.y+'px'; });
  draw();
}

build();
loadSample();
window.addEventListener('resize', draw);
</script>
</body>
</html>
